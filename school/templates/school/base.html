<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Онлайн-школа</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'index' %}">📚 Онлайн-школа</a>
        <div class="ms-auto">
            {% if user.is_authenticated %}
                {% if user.is_staff %}
                    <a href="{% url 'teacher_dashboard' %}" class="btn btn-outline-warning btn-sm me-2">
                        ⚙️ Панель преподавателя
                    </a>
                {% endif %}
                    <a href="{% url 'student_profile' %}" class="btn btn-outline-light btn-sm me-2">
                        👤 Кабинет
                    </a>
                <span class="text-light me-3">{{ user.username }}</span>
                <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Выйти</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm me-2">Войти</a>
                <a href="{% url 'register' %}" class="btn btn-light btn-sm">Регистрация</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

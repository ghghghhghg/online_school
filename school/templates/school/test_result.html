{% extends 'school/base.html' %}

{% block content %}
<div class="text-center mt-4">
    {% if result.passed %}
        <div class="display-1">🎉</div>
        <h2 class="text-success">Тест сдан!</h2>
    {% else %}
        <div class="display-1">😔</div>
        <h2 class="text-danger">Тест не сдан</h2>
    {% endif %}

    <h4 class="mt-3">Результат: {{ result.score }}%</h4>
    <p class="text-muted">Проходной балл: {{ test.pass_score }}%</p>

    <div class="mt-4 d-flex gap-2 justify-content-center">
        {% if not result.passed %}
            <a href="{% url 'test' lesson.pk %}" class="btn btn-primary">
                Попробовать ещё раз
            </a>
        {% endif %}
        <a href="{% url 'course' lesson.course.pk %}" class="btn btn-outline-secondary">
            К списку уроков
        </a>
    </div>
</div>
{% endblock %}

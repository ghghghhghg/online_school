{% extends 'school/base.html' %}

{% block content %}
<h2 class="mb-4">Новая контрольная точка</h2>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">После какого раздела разместить</label>
                <select name="after_module" class="form-select">
                    <option value="">В самом начале курса</option>
                    {% for module in course.modules.all %}
                    <option value="{{ module.id }}">После «{{ module.title }}»</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Название точки</label>
                <input type="text" name="title" class="form-control" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Создать и добавить задания</button>
                <a href="{% url 'teacher_course_dashboard' course.pk %}" class="btn btn-outline-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

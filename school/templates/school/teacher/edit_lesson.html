{% extends 'school/base.html' %}

{% block content %}
<h2 class="mb-4">Редактировать урок</h2>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Порядок</label>
                <input type="number" name="order" value="{{ lesson.order }}"
                       class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Название</label>
                <input type="text" name="title" value="{{ lesson.title }}"
                       class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Описание</label>
                <textarea name="description" class="form-control"
                          rows="3">{{ lesson.description }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Ссылка на YouTube</label>
                <input type="url" name="video_url" value="{{ lesson.video_url }}"
                       class="form-control">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="{% url 'teacher_dashboard' %}"
                   class="btn btn-outline-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

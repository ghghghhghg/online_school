{% extends 'school/base.html' %}

{% block content %}
<h2 class="mb-4">Редактировать урок</h2>

<div class="card">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Порядок</label>
                <input type="number" name="order" value="{{ lesson.order }}"
                       class="form-control" required>
            </div>
            <div class="mb-3">
                    <label class="form-label">Раздел (необязательно)</label>
                    <select name="module" class="form-select">
                        <option value="">Без раздела</option>
                        {% for module in lesson.course.modules.all %}
                        <option value="{{ module.id }}" {% if lesson.module_id == module.id %}selected{% endif %}>
                            {{ module.title }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            <div class="mb-3">
                <label class="form-label">Название</label>
                <input type="text" name="title" value="{{ lesson.title }}"
                       class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Описание</label>
                <textarea name="description" class="form-control"
                          rows="3">{{ lesson.description }}</textarea>
            </div>

            <hr>
            <p class="fw-bold mb-1">Видео</p>

            {% if lesson.video_file %}
            <div class="mb-3">
                <p class="text-muted small mb-1">Текущее видео:</p>
                <video width="320" height="180" controls style="border-radius: 6px;">
                    <source src="{{ lesson.video_file.url }}" type="video/mp4">
                </video>
            </div>
            {% endif %}

            <div class="mb-3">
                <label class="form-label">Загрузить новое видео</label>
                <input type="file" name="video_file" class="form-control"
                       accept="video/*">
                <div class="form-text">Загрузи новый файл чтобы заменить текущее видео</div>
            </div>

            <div class="mb-3">
                <label class="form-label">Или ссылка на VK/YouTube</label>
                <input type="url" name="video_url" value="{{ lesson.video_url }}"
                       class="form-control">
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="{% url 'teacher_dashboard' %}"
                   class="btn btn-outline-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

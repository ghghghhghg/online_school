{% extends 'school/base.html' %}

{% block content %}
<h2 class="mb-4">Создать тест для урока «{{ lesson.title }}»</h2>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Название теста</label>
                <input type="text" name="title" class="form-control"
                       placeholder="Тест по уроку 1" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Проходной балл (%)</label>
                <input type="number" name="pass_score" class="form-control"
                       value="70" min="1" max="100" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Создать</button>
                <a href="{% url 'teacher_dashboard' %}"
                   class="btn btn-outline-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

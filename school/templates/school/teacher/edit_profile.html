{% extends 'school/base.html' %}

{% block content %}
<h2 class="mb-4">Профиль преподавателя</h2>

<div class="card">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Имя</label>
                <input type="text" name="name" value="{{ profile.name }}"
                       class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">О себе</label>
                <textarea name="bio" class="form-control"
                          rows="5"
                          placeholder="Расскажи о себе, опыте, достижениях...">{{ profile.bio }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Предмет</label>
                <input type="text" name="subject" value="{{ profile.subject }}" class="form-control" placeholder="Русский язык">
            </div>
            <div class="mb-3">
                <label class="form-label">Фото</label>
                {% if profile.photo %}
                    <div class="mb-2">
                        <img src="{{ profile.photo.url }}" width="120"
                             class="rounded-circle">
                    </div>
                {% endif %}
                <input type="file" name="photo" class="form-control"
                       accept="image/*">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="{% url 'teacher_dashboard' %}"
                   class="btn btn-outline-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% extends 'school/base.html' %}

{% block content %}
<h2 class="mb-4">Новый пробник</h2>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Название</label>
                <input type="text" name="title" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Описание (необязательно)</label>
                <textarea name="description" class="form-control" rows="3"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Время на выполнение (минут)</label>
                <input type="number" name="duration_minutes" class="form-control" value="60" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Создать и добавить задания</button>
                <a href="{% url 'teacher_course_dashboard' course.pk %}" class="btn btn-outline-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

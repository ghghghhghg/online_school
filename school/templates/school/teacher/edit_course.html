{% extends 'school/base.html' %}

{% block content %}
<h2 class="mb-4">Редактировать курс</h2>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="form-check mb-3">
                <input type="checkbox" name="is_published" class="form-check-input"
                    id="is_published" {% if course.is_published %}checked{% endif %}>
                <label class="form-check-label" for="is_published">Курс опубликован (виден на сайте)</label>
            </div>
            <div class="mb-3">
                <label class="form-label">Название</label>
                <input type="text" name="title" value="{{ course.title }}"
                       class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Краткое описание</label>
                <textarea name="description" class="form-control"
                          rows="2">{{ course.description }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Что будет в курсе</label>
                <textarea name="what_you_learn" class="form-control"
                          rows="4"
                          placeholder="Каждый пункт с новой строки...">{{ course.what_you_learn }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Кому подойдёт</label>
                <textarea name="for_whom" class="form-control"
                          rows="4"
                          placeholder="Каждый пункт с новой строки...">{{ course.for_whom }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Как проходит обучение</label>
                <textarea name="how_it_works" class="form-control"
                          rows="4"
                          placeholder="Опиши процесс обучения...">{{ course.how_it_works }}</textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="{% url 'teacher_dashboard' %}"
                   class="btn btn-outline-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% extends 'school/base.html' %}

{% block content %}
<h2 class="mb-4">Редактировать раздел</h2>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Название раздела</label>
                <input type="text" name="title" value="{{ module.title }}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Порядок</label>
                <input type="number" name="order" value="{{ module.order }}" class="form-control" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="{% url 'teacher_course_dashboard' module.course.pk %}"
                   class="btn btn-outline-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% extends 'school/base.html' %}

{% block content %}
<h2 class="mb-4">Добавить урок</h2>

<div class="card">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Порядок</label>
                <input type="number" name="order" value="{{ next_order }}"
                       class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Название</label>
                <input type="text" name="title" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Описание</label>
                <textarea name="description" class="form-control" rows="3"></textarea>
            </div>

            <hr>
            <p class="fw-bold mb-1">Видео</p>
            <p class="text-muted small mb-3">Загрузи файл или вставь ссылку на VK/YouTube — одно из двух</p>

            <div class="mb-3">
                <label class="form-label">Загрузить видео файл</label>
                <input type="file" name="video_file" class="form-control"
                       accept="video/*">
                <div class="form-text">MP4, MOV, AVI — до 100MB на бесплатном тарифе Cloudinary</div>
            </div>

            <div class="mb-3">
                <label class="form-label">Или ссылка на VK/YouTube</label>
                <input type="url" name="video_url" class="form-control"
                       placeholder="https://vk.com/video_ext.php?...">
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Добавить</button>
                <a href="{% url 'teacher_dashboard' %}"
                   class="btn btn-outline-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

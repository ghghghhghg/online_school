{% extends 'school/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h2 class="mb-4">Восстановление пароля</h2>
        <p class="text-muted">Введите email, указанный при регистрации — пришлём ссылку для сброса пароля.</p>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Отправить ссылку</button>
        </form>
        <p class="mt-3 text-center">
            <a href="{% url 'login' %}">← Вернуться ко входу</a>
        </p>
    </div>
</div>
{% endblock %}

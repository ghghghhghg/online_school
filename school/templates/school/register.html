{% extends 'school/base.html' %}

{% block title %}Регистрация — Онлайн-школа{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h2 class="mb-4">Регистрация</h2>

        {% if errors %}
            <div class="alert alert-warning">
                <ul class="mb-0 ps-3">
                    {% for error in errors %}
                        <li>{{ error }}</li>
                    {% endfor %}
                </ul>
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-6 mb-3">
                    <label class="form-label">Имя</label>
                    <input type="text" name="first_name" class="form-control"
                           value="{{ form_data.first_name|default:'' }}" required>
                </div>
                <div class="col-6 mb-3">
                    <label class="form-label">Фамилия</label>
                    <input type="text" name="last_name" class="form-control"
                           value="{{ form_data.last_name|default:'' }}" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control"
                       value="{{ form_data.email|default:'' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" required>
                <div class="form-text">Минимум 8 символов</div>
            </div>
            <div class="mb-3">
                <label class="form-label">Повторите пароль</label>
                <input type="password" name="password2" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
        </form>
        <p class="mt-3 text-center">
            Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a>
        </p>
    </div>
</div>
{% endblock %}
